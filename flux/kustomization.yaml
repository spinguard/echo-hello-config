apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: echo-hello
  namespace: flux-system
spec:
  interval: 1m
  path: "./k8s"   # repo path containing k8s manifests or kustomization.yaml
  prune: true
  sourceRef:
    kind: GitRepository
    name: echo-hello-config
  targetNamespace: bkable
  validation: client
  retryInterval: 1m
  timeout: 2m
