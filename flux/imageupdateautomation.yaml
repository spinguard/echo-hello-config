apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: echo-hello
  namespace: tanzu-source-controller
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: echo-hello-config
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: 'chore: update echo-hello to {{range .Updated.Images}}{{.}}{{end}}'
    push:
      branch: main
  update:
    path: ./k8s
    strategy: Setters
